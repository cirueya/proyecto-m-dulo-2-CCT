<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Alke Wallet</title>

    <!--FontAwesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!--Bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!--Estilos-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="register-page">
    <header>
        <div class="register">
            <div class="container header-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor"
                    class="bi bi-piggy-bank" viewBox="0 0 16 16">
                    <path
                        d="M5 6.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0m1.138-1.496A6.6 6.6 0 0 1 7.964 4.5c.666 0 1.303.097 1.893.273a.5.5 0 0 0 .286-.958A7.6 7.6 0 0 0 7.964 3.5c-.734 0-1.441.103-2.102.292a.5.5 0 1 0 .276.962" />
                    <path fill-rule="evenodd"
                        d="M7.964 1.527c-2.977 0-5.571 1.704-6.32 4.125h-.55A1 1 0 0 0 .11 6.824l.254 1.46a1.5 1.5 0 0 0 1.478 1.243h.263c.3.513.688.978 1.145 1.382l-.729 2.477a.5.5 0 0 0 .48.641h2a.5.5 0 0 0 .471-.332l.482-1.351c.635.173 1.31.267 2.011.267.707 0 1.388-.095 2.028-.272l.543 1.372a.5.5 0 0 0 .465.316h2a.5.5 0 0 0 .478-.645l-.761-2.506C13.81 9.895 14.5 8.559 14.5 7.069q0-.218-.02-.431c.261-.11.508-.266.705-.444.315.306.815.306.815-.417 0 .223-.5.223-.461-.026a1 1 0 0 0 .09-.255.7.7 0 0 0-.202-.645.58.58 0 0 0-.707-.098.74.74 0 0 0-.375.562c-.024.243.082.48.32.654a2 2 0 0 1-.259.153c-.534-2.664-3.284-4.595-6.442-4.595M2.516 6.26c.455-2.066 2.667-3.733 5.448-3.733 3.146 0 5.536 2.114 5.536 4.542 0 1.254-.624 2.41-1.67 3.248a.5.5 0 0 0-.165.535l.66 2.175h-.985l-.59-1.487a.5.5 0 0 0-.629-.288c-.661.23-1.39.359-2.157.359a6.6 6.6 0 0 1-2.157-.359.5.5 0 0 0-.635.304l-.525 1.471h-.979l.633-2.15a.5.5 0 0 0-.17-.534 4.65 4.65 0 0 1-1.284-1.541.5.5 0 0 0-.446-.275h-.56a.5.5 0 0 1-.492-.414l-.254-1.46h.933a.5.5 0 0 0 .488-.393m12.621-.857a.6.6 0 0 1-.098.21l-.044-.025c-.146-.09-.157-.175-.152-.223a.24.24 0 0 1 .117-.173c.049-.027.08-.021.113.012a.2.2 0 0 1 .064.199" />
                </svg>
                <h1 class="text-center">Alke Wallet</h1>
                <form class="d-flex align-items-center gap-2">
                    <label for="buscar" class="form-label"></label>
                    <input id="buscar" type="search" class="form-control" placeholder="Buscar">
                </form>
            </div>
        </div>
    </header>
    <main>
        <section>
            <div class="container main-container">
                <div class="row justify-content-center">

                    <div id="mensaje"></div>
                    <div class="card p-4 shadow register-card">
                        <h2 class="mb-4">Crea tu cuenta</h2>
                        <div>
                            <form id="form-registro" action="">
                                <div class="mb-3 text-start">
                                    <label for="nombre" class="form-label">Nombre Completo</label>
                                    <input type="text" name="nombre" class="form-control" id="nombre"
                                        placeholder="Ingrese su nombre">
                                </div>

                                <div class="mb-3 text-start">
                                    <label for="Usuario" class="form-label">Usuario</label>
                                    <input type="text" name="Usuario" class="form-control" id="usuario"
                                        placeholder="Ingrese su usuario">
                                </div>
                                <div class="mb-3 text-start">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <input type="password" name="password" class="form-control" id="password"
                                        placeholder="Ingrese su contraseña">
                                </div>
                                <div class="mb-3 text-start">
                                    <label for="confirmar_password" class="form-label">Confirmar contraseña</label>
                                    <input type="password" name="confirmar_password" class="confirmar_password"
                                        id="confirmar_password" placeholder="Repita la contraseña">
                                </div>

                                <button class="btn-register mt-3">Registrarse</button>
                            </form>
                        </div>
                        <div>
                            <p class="text-center pt-3">¿Ya tienes cuenta?<a href="login.html">Iniciar Sesión</a></p>
                        </div>

                    </div>
                    <div class="flecha-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-arrow-up-short" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M8 12a.5.5 0 0 0 .5-.5V5.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 5.707V11.5a.5.5 0 0 0 .5.5" />
                        </svg>
                    </div>
                </div>
            </div>
            </div>
            <section>
                <section>
                    <div class="container">
                        <div class="row justify-content-center">
                            <div class="col text-center">
                                <ul>
                                    <li>Rápido</li>
                                    <li>Seguro</li>
                                    <li>Asistencia 24/7</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </section>
    </main>


    <footer class="mt-5">
        <hr>
        <div class="container-fluid footer-container text-center">
            <p>© 2026 Alke Wallet</p>
            <p>Contacto</p>

            <div class="contacto-redes d-flex justify-content-center gap-2">
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-whatsapp"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-solid fa-envelope"></i>
                <i class="fa-solid fa-phone"></i>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("form-registro").addEventListener("submit", function (event) {
            event.preventDefault();

            const nombre = document.getElementById("nombre").value;
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;
            const confirmar_password = document.getElementById("confirmar_password").value;

            if (password !== confirmar_password) {
                document.getElementById("mensaje").innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show">
            Las contraseñas no coinciden. Intente nuevamanente.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
                return;
            }

            const nuevoUsuario = {
                nombre,
                usuario,
                password
            }

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
            usuarios.push(nuevoUsuario);
            localStorage.setItem("usuarios", JSON.stringify(usuarios));
            document.getElementById("mensaje").innerHTML = `
    <div class="alert alert-sucess alart-dismissible fade show">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        <d/div>
    `;

            setTimeout(() => {
                window.location.href = "login.html";
            }, 3500);


        });
    </script>
</body>

</html>
